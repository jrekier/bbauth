<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Bowl — Team Hub</title>
    <!-- STATIC_INJECT -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ── Auth view ───────────────────────────────────────────── -->
    <div id="view-auth" class="view">
        <header>
            <canvas id="main-banner"></canvas>
            <p class="subtitle">Team Hub</p>
        </header>

        <div class="card">
            <div class="tabs">
                <button class="tab active" data-tab="login">Login</button>
                <button class="tab" data-tab="register">Register</button>
            </div>

            <form id="form-login">
                <label>Username</label>
                <input type="text" name="username" autocomplete="username" required>
                <label>Password</label>
                <input type="password" name="password" autocomplete="current-password" required>
                <p class="form-error" id="login-error"></p>
                <button type="submit">Login</button>
            </form>

            <form id="form-register" hidden>
                <label>Username</label>
                <input type="text" name="username" autocomplete="username" required>
                <label>Password</label>
                <input type="password" name="password" autocomplete="new-password" required>
                <p class="form-error" id="register-error"></p>
                <button type="submit">Create Account</button>
            </form>
        </div>
    </div>

    <!-- ── Lobby view (home after login) ──────────────────────── -->
    <div id="view-lobby" class="view" hidden>
        <header>
            <div class="header-row">
                <h1 id="lobby-greeting"></h1>
                <div class="header-btns">
                    <button class="btn-ghost" id="btn-manage-teams">My Teams</button>
                    <button class="btn-ghost" id="btn-logout-lobby">Logout</button>
                </div>
            </div>
            <p class="subtitle">Online Lobby</p>
        </header>

        <div class="lobby-actions">
            <button class="btn-primary" id="btn-create-room">+ Create Game</button>
        </div>

        <div id="lobby-open-rooms">
            <h3>Open games</h3>
            <div id="lobby-room-list"></div>
        </div>
    </div>

    <!-- ── Teams list view ─────────────────────────────────────── -->
    <div id="view-teams" class="view" hidden>
        <header>
            <div class="header-row">
                <h1>My Teams</h1>
                <div class="header-btns">
                    <button class="btn-ghost" id="btn-teams-back">← Lobby</button>
                    <button class="btn-ghost" id="btn-logout-teams">Logout</button>
                </div>
            </div>
        </header>

        <div id="teams-list"></div>

        <div class="teams-footer">
            <button class="btn-primary" id="btn-new-team">+ New Team</button>
        </div>
    </div>

    <!-- ── Team builder view ───────────────────────────────────── -->
    <div id="view-builder" class="view" hidden>
        <header>
            <div class="header-row">
                <h1 id="builder-greeting"></h1>
                <button class="btn-ghost" id="btn-builder-back">← My Teams</button>
            </div>
            <p class="subtitle" id="builder-subtitle">Build your team</p>
        </header>

        <!-- Step 1: race selection -->
        <div id="step-race">
            <h2>Choose a Race</h2>
            <div class="race-grid" id="race-cards"></div>
        </div>

        <!-- Step 2: roster builder -->
        <div id="step-roster" hidden>
            <div class="builder-top">
                <div class="team-name-row">
                    <input type="text" id="team-name" placeholder="Team name" maxlength="32">
                </div>
                <div class="budget-bar">
                    <span id="budget-label">1,000,000 gp</span>
                    <div class="budget-track">
                        <div class="budget-fill" id="budget-fill"></div>
                    </div>
                    <span id="budget-remaining"></span>
                </div>
            </div>

            <div class="colour-row">
                <div class="colour-pick">
                    <h3>Home colour</h3>
                    <div class="colour-swatches" id="home-colour-swatches"></div>
                </div>
                <div class="colour-pick">
                    <h3>Away colour</h3>
                    <div class="colour-swatches" id="away-colour-swatches"></div>
                </div>
            </div>

            <div class="builder-columns">
                <div class="builder-left">
                    <h3>Roster <span id="roster-count"></span></h3>
                    <ul id="roster-list"></ul>
                    <p class="hint" id="roster-hint"></p>
                </div>
                <div class="builder-right">
                    <h3>Add Player</h3>
                    <div id="position-cards"></div>
                </div>
            </div>

            <div class="builder-actions">
                <button class="btn-ghost" id="btn-back-race">← Change race</button>
                <button class="btn-primary" id="btn-save-team">Save Team</button>
            </div>
            <p class="form-error" id="builder-error"></p>
        </div>
    </div>

    <!-- ── Staging room view ──────────────────────────────────── -->
    <div id="view-room" class="view" hidden>
        <header>
            <div class="header-row">
                <h1 id="room-id-title"></h1>
                <button class="btn-ghost" id="btn-room-leave">Leave</button>
            </div>
            <p class="subtitle">Staging Room</p>
        </header>

        <div class="room-players" id="room-players">
            <div class="room-player" id="room-player-home">
                <div class="room-player-name" id="room-home-username">—</div>
                <div class="room-player-team" id="room-home-team"></div>
                <div class="room-player-status" id="room-home-status">Not ready</div>
            </div>
            <div class="room-vs">VS</div>
            <div class="room-player" id="room-player-away">
                <div class="room-player-name" id="room-away-username">—</div>
                <div class="room-player-team" id="room-away-team">Waiting for opponent…</div>
                <div class="room-player-status" id="room-away-status"></div>
            </div>
        </div>

        <!-- Game iframe (mobile playing state) -->
        <iframe id="room-game-frame" hidden allow="autoplay" title="Blood Bowl"></iframe>

        <!-- Chat-toggle button (mobile playing state, hidden until game launches) -->
        <button class="btn-ghost room-chat-toggle" id="btn-chat-toggle" hidden>Chat ▲</button>

        <div class="room-chat" id="room-chat">
            <div class="room-messages" id="room-messages"></div>
            <div class="room-chat-input">
                <input type="text" id="room-chat-text" placeholder="Type a message…" maxlength="280" disabled>
                <button class="btn-ghost" id="btn-room-send" disabled>Send</button>
            </div>
        </div>

        <div class="room-actions" id="room-actions">
            <button class="btn-primary" id="btn-room-ready" disabled>Ready</button>
            <p class="room-ready-hint" id="room-ready-hint"></p>
        </div>
    </div>

    <!-- ── Team picker modal ───────────────────────────────────── -->
    <div id="team-picker-overlay" class="modal-overlay" hidden>
        <div class="modal-card">
            <h2 id="team-picker-title">Pick a Team</h2>
            <div id="team-picker-list"></div>
            <div class="modal-actions">
                <button class="btn-ghost" id="btn-picker-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="roster-defs.js"></script>
    <script src="sprite-preview.js"></script>
    <script src="app.js"></script>
</body>
</html>
